<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>World clock | Temporal demo</title>
    <link rel="stylesheet" href="../base.css" />
  </head>
  <body>
    <nav class="site-nav"><a href="../">&larr; All demos</a></nav>
    <div class="wrap">
      <h1>World clock</h1>
      <p class="lead">One instant, shown as each city's local time.</p>

      <p id="unsupported" class="note" hidden>
        This browser does not support Temporal. Please use Chrome / Edge 144+ or Firefox 139+.
      </p>

      <div class="panel">
        <dl class="result" id="clocks"></dl>
      </div>
    </div>

    <script type="module">
      main();

      function main() {
        if (typeof Temporal === "undefined") {
          document.getElementById("unsupported").hidden = false;
          return;
        }

        const clocks = document.getElementById("clocks");
        const cities = [
          ["Tokyo", "Asia/Tokyo"],
          ["London", "Europe/London"],
          ["Paris", "Europe/Paris"],
          ["New York", "America/New_York"],
          ["Los Angeles", "America/Los_Angeles"],
          ["UTC", "UTC"],
        ];
        const options = {
          hour: "2-digit",
          minute: "2-digit",
          second: "2-digit",
          timeZoneName: "short",
        };

        const cells = new Map();
        for (const [name, tz] of cities) {
          const label = document.createElement("dt");
          label.textContent = name;
          const value = document.createElement("dd");
          value.classList.add("mono");
          clocks.append(label, value);
          cells.set(tz, value);
        }

        function tick() {
          const now = Temporal.Now.instant();
          for (const [name, tz] of cities) {
            cells.get(tz).textContent = now
              .toZonedDateTimeISO(tz)
              .toLocaleString("en-US", options);
          }
        }

        tick();
        setInterval(tick, 1000);
      }
    </script>
  </body>
</html>
