<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>World clock | Temporal demo</title>
    <link rel="stylesheet" href="../base.css" />
    <style>
      .worldclock {
        position: relative;
        overflow: hidden;
        border-radius: 4px;
        padding: 24px;
        background: #0d1526;
        color: #e6edf6;
      }
      .worldclock::before {
        content: "";
        position: absolute;
        inset: 0;
        background: url("./images/worldmap.svg") center / cover no-repeat;
        opacity: 0.4;
      }
      .clocks {
        position: relative;
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
        gap: 14px;
      }
      .clock-card {
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 4px;
        padding: 14px 16px;
        backdrop-filter: blur(2px);
      }
      .clock-city {
        font-size: 13px;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        color: #9fb0c8;
      }
      .clock-time {
        margin: 4px 0 2px;
        font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo,
          monospace;
        font-size: 28px;
        font-variant-numeric: tabular-nums;
        letter-spacing: 0.02em;
      }
      .clock-date {
        font-size: 12px;
        color: #7f8ea6;
      }
      .clock-foot {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-top: 10px;
        font-size: 12px;
        color: #9fb0c8;
      }
      .dst-badge {
        font-weight: bold;
        letter-spacing: 0.04em;
        color: #1a1206;
        background: #f2b03d;
        padding: 2px 8px;
        border-radius: 999px;
      }
      .dst-badge[hidden] {
        display: none;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>World clock</h1>
      <p class="lead">
        The current time around the world. Cities on summer time (DST) are
        marked.
      </p>

      <p id="unsupported" class="note" hidden>
        This browser does not support Temporal. Please use Chrome / Edge 144+ or
        Firefox 139+.
      </p>

      <div class="worldclock">
        <div class="clocks">
          <div class="clock-card" data-tz="Asia/Tokyo">
            <div class="clock-city">Tokyo</div>
            <div class="clock-time"></div>
            <div class="clock-date"></div>
            <div class="clock-foot">
              <span class="clock-offset"></span>
              <span class="dst-badge" hidden>DST</span>
            </div>
          </div>
          <div class="clock-card" data-tz="Europe/London">
            <div class="clock-city">London</div>
            <div class="clock-time"></div>
            <div class="clock-date"></div>
            <div class="clock-foot">
              <span class="clock-offset"></span>
              <span class="dst-badge" hidden>DST</span>
            </div>
          </div>
          <div class="clock-card" data-tz="Europe/Paris">
            <div class="clock-city">Paris</div>
            <div class="clock-time"></div>
            <div class="clock-date"></div>
            <div class="clock-foot">
              <span class="clock-offset"></span>
              <span class="dst-badge" hidden>DST</span>
            </div>
          </div>
          <div class="clock-card" data-tz="America/New_York">
            <div class="clock-city">New York</div>
            <div class="clock-time"></div>
            <div class="clock-date"></div>
            <div class="clock-foot">
              <span class="clock-offset"></span>
              <span class="dst-badge" hidden>DST</span>
            </div>
          </div>
          <div class="clock-card" data-tz="America/Los_Angeles">
            <div class="clock-city">Los Angeles</div>
            <div class="clock-time"></div>
            <div class="clock-date"></div>
            <div class="clock-foot">
              <span class="clock-offset"></span>
              <span class="dst-badge" hidden>DST</span>
            </div>
          </div>
          <div class="clock-card" data-tz="Australia/Sydney">
            <div class="clock-city">Sydney</div>
            <div class="clock-time"></div>
            <div class="clock-date"></div>
            <div class="clock-foot">
              <span class="clock-offset"></span>
              <span class="dst-badge" hidden>DST</span>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script type="module">
      main();

      function main() {
        if (typeof Temporal === "undefined") {
          document.getElementById("unsupported").hidden = false;
          return;
        }

        const cards = document.querySelectorAll(".clock-card");
        const timeOptions = {
          hour: "2-digit",
          minute: "2-digit",
          second: "2-digit",
          hour12: false
        };
        const dateOptions = {
          weekday: "short",
          month: "short",
          day: "numeric"
        };

        // 年内の1月と7月のオフセットを比べ、大きい方に一致すればDST中と判定する。
        // 掲載都市はいずれも正のDST（夏に前倒し）で成立する。負のDSTを持つゾーンでは判定が逆になる
        function isSummerTime(zdt) {
          const year = zdt.year;
          const offsetJan = Temporal.PlainDate.from(
            `${year}-01-15`
          ).toZonedDateTime(zdt.timeZoneId).offsetNanoseconds;
          const offsetJul = Temporal.PlainDate.from(
            `${year}-07-15`
          ).toZonedDateTime(zdt.timeZoneId).offsetNanoseconds;
          if (offsetJan === offsetJul) {
            return false;
          }
          return zdt.offsetNanoseconds === Math.max(offsetJan, offsetJul);
        }

        function tick() {
          const now = Temporal.Now.instant();
          for (const card of cards) {
            const zdt = now.toZonedDateTimeISO(card.dataset.tz);
            card.querySelector(".clock-time").textContent = zdt.toLocaleString(
              "en-GB",
              timeOptions
            );
            card.querySelector(".clock-date").textContent = zdt.toLocaleString(
              "en-US",
              dateOptions
            );
            card.querySelector(
              ".clock-offset"
            ).textContent = `UTC${zdt.offset}`;
            card
              .querySelector(".dst-badge")
              .toggleAttribute("hidden", !isSummerTime(zdt));
          }
        }

        tick();
        setInterval(tick, 1000);
      }
    </script>
    <nav class="site-nav"><a href="../">&larr; All demos</a></nav>
  </body>
</html>
