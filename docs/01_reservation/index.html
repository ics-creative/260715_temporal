<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Salon reservation | Temporal demo</title>
    <link rel="stylesheet" href="../base.css" />
  </head>
  <body>
    <nav class="site-nav"><a href="../">&larr; All demos</a></nav>
    <div class="wrap">
      <h1>Salon reservation</h1>
      <p class="lead">The confirmed time works across time zones.</p>

      <p id="unsupported" class="note" hidden>
        This browser does not support Temporal. Please use Chrome / Edge 144+ or Firefox 139+.
      </p>

      <div class="panel">
        <div class="field">
          <label for="store">Store</label>
          <select id="store">
            <option value="Asia/Tokyo" selected>Tokyo</option>
            <option value="Europe/London">London</option>
            <option value="America/New_York">New York</option>
          </select>
        </div>
        <div class="field">
          <label for="date">Date</label>
          <input type="date" id="date" value="2026-07-10" />
        </div>
        <div class="field">
          <label for="time">Start</label>
          <input type="time" id="time" value="14:00" />
        </div>
        <div class="field">
          <label for="course">Course</label>
          <select id="course">
            <option value="60">Relax (60 min)</option>
            <option value="90" selected>Standard (90 min)</option>
            <option value="120">Premium (120 min)</option>
          </select>
        </div>
        <div class="field">
          <label for="viewer">Your time zone</label>
          <select id="viewer">
            <option value="auto" selected>Auto (your location)</option>
            <option value="Asia/Tokyo">Tokyo</option>
            <option value="America/New_York">New York</option>
            <option value="Europe/London">London</option>
          </select>
        </div>
      </div>

      <div class="panel">
        <dl class="result">
          <dt>Store</dt>
          <dd id="out-store"></dd>
          <dt>Booking</dt>
          <dd id="out-booking" class="big"></dd>
          <dt>Confirmed (ISO)</dt>
          <dd id="out-iso" class="mono"></dd>
          <dt>Your local time</dt>
          <dd id="out-local"></dd>
        </dl>
      </div>
    </div>

    <script type="module">
      main();

      function main() {
        if (typeof Temporal === "undefined") {
          document.getElementById("unsupported").hidden = false;
          return;
        }

        const storeInput = document.getElementById("store");
        const dateInput = document.getElementById("date");
        const timeInput = document.getElementById("time");
        const courseInput = document.getElementById("course");
        const viewerInput = document.getElementById("viewer");
        const outStore = document.getElementById("out-store");
        const outBooking = document.getElementById("out-booking");
        const outIso = document.getElementById("out-iso");
        const outLocal = document.getElementById("out-local");

        const timeOptions = { hour: "numeric", minute: "2-digit" };
        const fullOptions = {
          month: "short",
          day: "numeric",
          hour: "numeric",
          minute: "2-digit",
          timeZoneName: "short",
        };

        function update() {
          if (!dateInput.value || !timeInput.value) {
            return;
          }
          const storeTz = storeInput.value;
          const viewerTz =
            viewerInput.value === "auto"
              ? Temporal.Now.timeZoneId()
              : viewerInput.value;

          const day = Temporal.PlainDate.from(dateInput.value);
          const start = Temporal.PlainTime.from(timeInput.value);
          const end = start.add({ minutes: Number(courseInput.value) });

          const reserved = day.toZonedDateTime({ timeZone: storeTz, plainTime: start });
          const local = reserved.withTimeZone(viewerTz);

          outStore.textContent = `${storeInput.selectedOptions[0].textContent} (${storeTz})`;
          outBooking.textContent =
            `${day.toLocaleString("en-US", { month: "short", day: "numeric" })} · ` +
            `${start.toLocaleString("en-US", timeOptions)} – ${end.toLocaleString("en-US", timeOptions)}`;
          outIso.textContent = reserved.toString();
          outLocal.textContent = local.toLocaleString("en-US", fullOptions);
        }

        const inputs = [storeInput, dateInput, timeInput, courseInput, viewerInput];
        for (const input of inputs) {
          input.addEventListener("input", update);
        }
        update();
      }
    </script>
  </body>
</html>
