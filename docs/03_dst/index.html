<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Time difference | Temporal demo</title>
    <link rel="stylesheet" href="../base.css" />
  </head>
  <body>
    <nav class="site-nav"><a href="../">&larr; All demos</a></nav>
    <div class="wrap">
      <h1>Time difference</h1>
      <p class="lead">
        The gap between two cities can change through the year because of Daylight Saving Time.
      </p>

      <p id="unsupported" class="note" hidden>
        This browser does not support Temporal. Please use Chrome / Edge 144+ or Firefox 139+.
      </p>

      <div class="panel">
        <div class="field">
          <label for="cityA">Your city</label>
          <select id="cityA">
            <option value="Asia/Tokyo" selected>Tokyo</option>
            <option value="Europe/London">London</option>
            <option value="Europe/Paris">Paris</option>
            <option value="America/New_York">New York</option>
            <option value="America/Los_Angeles">Los Angeles</option>
            <option value="UTC">UTC</option>
          </select>
        </div>
        <div class="field">
          <label for="cityB">Partner city</label>
          <select id="cityB">
            <option value="Asia/Tokyo">Tokyo</option>
            <option value="Europe/London" selected>London</option>
            <option value="Europe/Paris">Paris</option>
            <option value="America/New_York">New York</option>
            <option value="America/Los_Angeles">Los Angeles</option>
            <option value="UTC">UTC</option>
          </select>
        </div>
        <div class="field">
          <label for="date">Date</label>
          <input type="date" id="date" value="2026-07-10" />
        </div>
      </div>

      <div class="panel">
        <dl class="result">
          <dt>Difference</dt>
          <dd id="out-diff" class="big"></dd>
          <dt>At 12:00 in A</dt>
          <dd id="out-at"></dd>
          <dt>Offsets</dt>
          <dd id="out-offsets" class="mono"></dd>
        </dl>
        <p class="note" id="note"></p>
      </div>
    </div>

    <script type="module">
      main();

      function main() {
        if (typeof Temporal === "undefined") {
          document.getElementById("unsupported").hidden = false;
          return;
        }

        const NOON = Temporal.PlainTime.from("12:00");
        const cityAInput = document.getElementById("cityA");
        const cityBInput = document.getElementById("cityB");
        const dateInput = document.getElementById("date");
        const outDiff = document.getElementById("out-diff");
        const outAt = document.getElementById("out-at");
        const outOffsets = document.getElementById("out-offsets");
        const note = document.getElementById("note");

        // A の正午を基準に、同じ瞬間の A と B のオフセット差（時間）を返す
        function diffHours(dateStr, tzA, tzB) {
          const atA = Temporal.PlainDate.from(dateStr).toZonedDateTime({
            timeZone: tzA,
            plainTime: NOON,
          });
          const atB = atA.withTimeZone(tzB);
          return (atA.offsetNanoseconds - atB.offsetNanoseconds) / 3_600_000_000_000;
        }

        function label(select) {
          return select.selectedOptions[0].textContent;
        }

        function gapText(hours, nameA, nameB) {
          if (hours === 0) {
            return `${nameA} and ${nameB} share the same time`;
          }
          const dir = hours > 0 ? "ahead of" : "behind";
          return `${nameA} is ${Math.abs(hours)} hours ${dir} ${nameB}`;
        }

        function update() {
          if (!dateInput.value) {
            return;
          }
          const tzA = cityAInput.value;
          const tzB = cityBInput.value;
          const nameA = label(cityAInput);
          const nameB = label(cityBInput);

          const atA = Temporal.PlainDate.from(dateInput.value).toZonedDateTime({
            timeZone: tzA,
            plainTime: NOON,
          });
          const atB = atA.withTimeZone(tzB);
          const hours =
            (atA.offsetNanoseconds - atB.offsetNanoseconds) / 3_600_000_000_000;

          outDiff.textContent = gapText(hours, nameA, nameB);
          outAt.textContent = `12:00 in ${nameA} = ${atB.toLocaleString("en-US", { hour: "numeric", minute: "2-digit" })} in ${nameB}`;
          outOffsets.textContent = `${nameA} UTC${atA.offset} / ${nameB} UTC${atB.offset}`;

          const year = Temporal.PlainDate.from(dateInput.value).year;
          const summer = diffHours(`${year}-07-01`, tzA, tzB);
          const winter = diffHours(`${year}-01-01`, tzA, tzB);
          if (summer === winter) {
            note.textContent =
              "Neither city observes Daylight Saving Time on these dates, so the gap stays the same all year.";
          } else {
            note.textContent =
              `Because of Daylight Saving Time, the gap changes through the year: ${Math.abs(summer)} hours around July and ${Math.abs(winter)} hours around January.`;
          }
        }

        cityAInput.addEventListener("input", update);
        cityBInput.addEventListener("input", update);
        dateInput.addEventListener("input", update);
        update();
      }
    </script>
  </body>
</html>
