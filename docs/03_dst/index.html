<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Schedule | Temporal demo</title>
    <link rel="stylesheet" href="../base.css" />
  </head>
  <body>
    <nav class="site-nav"><a href="../">&larr; All demos</a></nav>
    <div class="wrap">
      <h1>Schedule</h1>
      <p class="lead">Move an event and it stays correct across a DST change.</p>

      <p id="unsupported" class="note" hidden>
        This browser does not support Temporal. Please use Chrome / Edge 144+ or Firefox 139+.
      </p>

      <div class="panel">
        <div class="field">
          <label for="event">Event start (London)</label>
          <input type="datetime-local" id="event" value="2026-03-29T00:30" />
        </div>
        <div style="display: flex; gap: 8px">
          <button id="minus" type="button">&minus;1 hour</button>
          <button id="plus" type="button">+1 hour</button>
        </div>
      </div>

      <div class="panel">
        <dl class="result">
          <dt>Event time</dt>
          <dd id="out-time" class="big"></dd>
          <dt>Offset</dt>
          <dd id="out-offset"></dd>
        </dl>
        <p class="note" id="note"></p>
      </div>
    </div>

    <script type="module">
      main();

      function main() {
        if (typeof Temporal === "undefined") {
          document.getElementById("unsupported").hidden = false;
          return;
        }

        const TZ = "Europe/London";
        const eventInput = document.getElementById("event");
        const minusButton = document.getElementById("minus");
        const plusButton = document.getElementById("plus");
        const outTime = document.getElementById("out-time");
        const outOffset = document.getElementById("out-offset");
        const note = document.getElementById("note");
        const options = {
          month: "short",
          day: "numeric",
          hour: "numeric",
          minute: "2-digit",
        };

        function current() {
          return Temporal.PlainDateTime.from(eventInput.value).toZonedDateTime(TZ);
        }

        function show(zdt, message) {
          outTime.textContent = zdt.toPlainDateTime().toLocaleString("en-US", options);
          outOffset.textContent = `UTC${zdt.offset}`;
          note.textContent = message;
        }

        function render() {
          if (!eventInput.value) {
            return;
          }
          show(current(), "");
        }

        function shift(hours) {
          if (!eventInput.value) {
            return;
          }
          const before = current();
          const after = before.add({ hours });
          eventInput.value = after.toPlainDateTime().toString().slice(0, 16);

          if (before.offset === after.offset) {
            show(after, "");
          } else {
            show(
              after,
              `Crossed a DST change: the offset shifted from UTC${before.offset} to UTC${after.offset}.`,
            );
          }
        }

        eventInput.addEventListener("input", render);
        minusButton.addEventListener("click", () => shift(-1));
        plusButton.addEventListener("click", () => shift(1));
        render();
      }
    </script>
  </body>
</html>
