<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Time difference | Temporal demo</title>
    <link rel="stylesheet" href="../base.css" />
  </head>
  <body>
    <nav class="site-nav"><a href="../">&larr; All demos</a></nav>
    <div class="wrap">
      <h1>Time difference</h1>

      <p id="unsupported" class="note" hidden>
        This browser does not support Temporal. Please use Chrome / Edge 144+ or Firefox 139+.
      </p>

      <div class="panel">
        <div class="field">
          <label for="cityA">Your city</label>
          <select id="cityA">
            <option value="Asia/Tokyo" selected>Tokyo</option>
            <option value="Europe/London">London</option>
            <option value="Europe/Paris">Paris</option>
            <option value="America/New_York">New York</option>
            <option value="America/Los_Angeles">Los Angeles</option>
            <option value="UTC">UTC</option>
          </select>
        </div>
        <div class="field">
          <label for="cityB">Destination</label>
          <select id="cityB">
            <option value="Asia/Tokyo">Tokyo</option>
            <option value="Europe/London" selected>London</option>
            <option value="Europe/Paris">Paris</option>
            <option value="America/New_York">New York</option>
            <option value="America/Los_Angeles">Los Angeles</option>
            <option value="UTC">UTC</option>
          </select>
        </div>
        <div class="field">
          <label for="date">Date</label>
          <input type="date" id="date" value="2026-07-10" />
        </div>
      </div>

      <div class="panel">
        <dl class="result">
          <dt>Difference</dt>
          <dd id="out-diff" class="big"></dd>
        </dl>
      </div>
    </div>

    <script type="module">
      main();

      function main() {
        if (typeof Temporal === "undefined") {
          document.getElementById("unsupported").hidden = false;
          return;
        }

        const cityAInput = document.getElementById("cityA");
        const cityBInput = document.getElementById("cityB");
        const dateInput = document.getElementById("date");
        const outDiff = document.getElementById("out-diff");

        // A基準で、同じ瞬間をBで見たときのオフセット差（時間）を返す
        function diffHours(dateStr, tzA, tzB) {
          const atA = Temporal.PlainDate.from(dateStr).toZonedDateTime({
            timeZone: tzA,
            plainTime: Temporal.PlainTime.from("12:00"),
          });
          const atB = atA.withTimeZone(tzB);
          return (atA.offsetNanoseconds - atB.offsetNanoseconds) / 3_600_000_000_000;
        }

        // その日付にサマータイムが適用されているか
        function inDST(dateStr, tz) {
          const year = Temporal.PlainDate.from(dateStr).year;
          const winter = diffHours(`${year}-01-15`, tz, "UTC");
          const summer = diffHours(`${year}-07-15`, tz, "UTC");
          if (winter === summer) {
            return false;
          }
          return diffHours(dateStr, tz, "UTC") === Math.max(winter, summer);
        }

        function update() {
          if (!dateInput.value) {
            return;
          }
          const yourTz = cityAInput.value;
          const destTz = cityBInput.value;
          const date = dateInput.value;

          // 目的地が自分の都市より何時間ずれているか
          const hours = diffHours(date, destTz, yourTz);
          if (hours === 0) {
            outDiff.textContent = "Same time";
            return;
          }
          const sign = hours >= 0 ? "+" : "−";
          const unit = Math.abs(hours) === 1 ? "hour" : "hours";
          const dst = inDST(date, yourTz) || inDST(date, destTz);

          outDiff.textContent =
            `${sign} ${Math.abs(hours)} ${unit}` +
            (dst ? " (Daylight Saving Time)" : "");
        }

        cityAInput.addEventListener("input", update);
        cityBInput.addEventListener("input", update);
        dateInput.addEventListener("input", update);
        update();
      }
    </script>
  </body>
</html>
